services:
  snooker-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../configs:/app/configs:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

