<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snooker AI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top">
    <h1>Snooker AI</h1>
    <p class="sub">Automatic shot detection &amp; pause-free highlights</p>
  </header>

  <main class="panel">
    <section class="card">
      <h2>Upload &amp; analyze</h2>
      <form id="upload-form">
        <label class="file-label">
          <input type="file" id="file" accept="video/*,.mp4,.mov,.mkv,.avi,.webm" required />
          <span id="file-name">Choose a snooker video…</span>
        </label>
        <div class="row">
          <label>Mode
            <select id="mode">
              <option value="strict" selected>Strict (1s before strike → balls stop)</option>
              <option value="action_only">Action Only</option>
              <option value="natural">Natural Highlights</option>
              <option value="full_sequence">Full Shot Sequence</option>
            </select>
          </label>
          <button type="submit" id="start-btn">Start analysis</button>
        </div>
      </form>
      <div id="progress-wrap" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text">Starting…</p>
      </div>
    </section>

    <section class="card">
      <h2>Recent jobs</h2>
      <div id="jobs" class="jobs"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
